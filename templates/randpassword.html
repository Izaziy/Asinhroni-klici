<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Password</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
            integrity="sha256-/xUj+3OJ+Y9O2Q3tàP3gVVGA5MXhXc8qVb2fT5rj30="
            crossorigin="anonymous"></script>
</head>
<body>
    <h1>Generate your password</h1>
    
    <form id="passwordForm">
        <label for="length">Password Length:</label>
        <input type="number" id="length" name="length" min="1" required>
        
        <button type="submit">Generate</button>
    </form>
    
    <div id="rezultat">
    </div>

    <script>
    document.getElementById("passwordForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const length = document.getElementById("length").value;
        
        $.ajax({
            url: "/randPassword",
            method: "POST",
            data: {
                length: length
            },
            success: function(odgovor) {
                $("#rezultat").html(
                    '<h2>Your password: ' + odgovor.password + '</h2>' +
                    '<p>Length: ' + odgovor.length + '</p>'
                );
            }
        });
    });
    </script>
</body>
</html>
